<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для Айжан ✨</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        :root {
            --bg: #fffcf9;
            --rose: #ffafbd;
            --text: #4a3f35;
            --accent: #ff8c94;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Comfortaa', cursive;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 15px 40px rgba(255, 143, 163, 0.12);
            text-align: center;
            border-left: 8px solid var(--rose);
            width: 100%;
            position: relative;
            animation: fadeIn 0.6s ease-out forwards;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            color: var(--accent);
            margin: 0 0 15px 0;
        }

        p {
            line-height: 1.6;
            font-size: clamp(1rem, 4vw, 1.15rem);
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            background: white;
            border: 2.5px solid var(--rose);
            padding: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            color: var(--text);
            transition: 0.3s;
            font-size: 1rem;
            width: 100%;
        }

        .btn:hover {
            background: var(--rose);
            color: white;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.96);
            background: var(--rose);
            color: white;
        }

        #final-screen {
            display: none;
        }

        .progress {
            font-size: 0.85rem;
            color: var(--rose);
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-note {
            font-family: 'Caveat';
            font-size: 2.2rem;
            color: var(--accent);
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container" id="quiz-area">
        <div id="progress-text" class="progress"></div>
        <div id="card-content" class="card">
            <!-- Вопросы -->
        </div>
    </div>

    <div class="container" id="final-screen">
        <div class="card">
            <h1 style="font-size: 5rem; margin-bottom: 0;">🌸</h1>
            <h1>Айжан, ты чудо!</h1>
            <p>Спасибо, что поделилась своими вкусами. Теперь я знаю тебя ещё чуточку лучше! Пусть твой день будет таким
                же сладким, как твои любимые десерты! ❤️</p>
            <div class="footer-note">Твой лучший друг</div>
        </div>
    </div>

    <script>
        const FORMSPREE_URL = "https://formspree.io/f/myknwbrd";

        const answers = {};
        const questions = [
            { id: "Q1", q: "Привет, Айжан! ✨ Давай узнаем тебя получше. Твой идеальный напиток для настроения?", a: ["Горячий кофе ☕", "Нежный чай 🍵", "Освежающий сок 🥤", "Сладкий коктейль 🍹"] },
            { id: "Q2", q: "Если выбирать десерт, то это будет...", a: ["Шоколадный торт 🍰", "Фруктовый салат 🍎", "Мороженое 🍦", "Хрустящее печенье 🍪"] },
            { id: "Q3", q: "Какую кухню ты любишь больше всего?", a: ["Пицца и паста 🍕", "Суши и роллы 🍱", "Домашняя еда 🍲", "Острые бургеры 🍔"] },
            { id: "Q4", q: "Твой любимый способ расслабиться после дня?", a: ["Посмотреть сериал 🎬", "Послушать музыку 🎧", "Прогуляться 🌳", "Просто поспать 😴"] },
            { id: "Q5", q: "Какой цвет тебе кажется самым уютным?", a: ["Нежный розовый 🌸", "Глубокий синий 🌊", "Теплый бежевый 🍦", "Яркий желтый ✨"] },
            { id: "Q6", q: "Любимое время года Айжан?", a: ["Цветущая весна 🌱", "Жаркое лето ☀️", "Золотая осень 🍂", "Снежная зима ❄️"] },
            { id: "Q7", q: "Если бы ты могла выбрать суперсилу, это было бы...", a: ["Летать как птица 🕊️", "Читать мысли 🧠", "Путешествовать во времени ⏳", "Исцелять людей ❤️"] },
            { id: "Q8", q: "Что тебе важнее в подарке?", a: ["Сюрприз и эмоции 🎁", "Польза и практичность ✨", "Внимание и ручная работа 🙌"] },
            { id: "Q9", q: "Твой идеальный вечер — это...", a: ["В шумной компании 😂", "В тишине с книгой 📖", "На прогулке под звездами ✨"] },
            { id: "Q10", q: "Айжан, ты знаешь, что ты заслуживаешь всего самого лучшего?", a: ["Теперь точно знаю ✨", "Всегда это знала! 😊"] }
        ];

        let current = 0;

        function render() {
            const data = questions[current];
            const cardContent = document.getElementById('card-content');
            const progressText = document.getElementById('progress-text');

            progressText.innerText = `Вопрос ${current + 1} из ${questions.length}`;

            cardContent.innerHTML = `
                <h1>Айжан...</h1>
                <p>${data.q}</p>
                <div class="btn-group" id="btn-box"></div>
            `;

            const btnBox = document.getElementById('btn-box');
            data.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt;
                b.onclick = () => {
                    answers[data.q] = opt;
                    current++;
                    if (current < questions.length) render();
                    else finish();
                };
                btnBox.appendChild(b);
            });
        }

        async function finish() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('final-screen').style.display = 'flex';

            if (typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            try {
                await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(answers)
                });
            } catch (e) { console.log("Sent silently"); }
        }

        render();
    </script>
</body>

</html>
