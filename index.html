<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для Айжан ✨</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #fffcf9;
            --rose: #ffafbd;
            --text: #4a3f35;
            --accent: #ff8c94;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Comfortaa', cursive;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 15px 40px rgba(255, 143, 163, 0.12);
            text-align: center;
            border-left: 8px solid var(--rose);
            width: 100%;
            position: relative;
            animation: fadeIn 0.6s ease-out forwards;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            color: var(--accent);
            margin: 0 0 15px 0;
        }

        p {
            line-height: 1.6;
            font-size: clamp(1rem, 4vw, 1.15rem);
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            background: white;
            border: 2.5px solid var(--rose);
            padding: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            color: var(--text);
            transition: 0.3s;
            font-size: 1rem;
            width: 100%;
        }

        .btn:hover {
            background: var(--rose);
            color: white;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.96);
            background: var(--rose);
            color: white;
        }

        #final-screen {
            display: none;
        }

        .progress {
            font-size: 0.85rem;
            color: var(--rose);
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-note {
            font-family: 'Caveat';
            font-size: 2.2rem;
            color: var(--accent);
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container" id="quiz-area">
        <div id="progress-text" class="progress"></div>
        <div id="card-content" class="card">
            <!-- Вопросы -->
        </div>
    </div>

    <div class="container" id="final-screen">
        <div class="card">
            <h1 style="font-size: 5rem; margin-bottom: 0;">🌸</h1>
            <h1>Айжан, ты чудо!</h1>
            <p>Спасибо за твою искренность. Пусть этот день принесет тебе море улыбок и тепла! ❤️</p>
            <div class="footer-note">Твой лучший друг</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            token: "8793262316:AAEK7VywXr-Le9GaCuLiwOcC_E3wQotV98M",
            chatId: "5487500703"
        };

        const answers = [];
        const questions = [
            { q: "Айжан, ты готова к самому честному опросу о себе? ✨", a: ["Конечно! 😊", "Поехали! ❤️"] },
            { q: "Твое идеальное утро — это...", a: ["Тишина и кофе ☕", "Активный старт 🏃‍♀️", "Сон до обеда 😴"] },
            { q: "Какая черта твоего характера — твоя суперсила?", a: ["Доброта ❤️", "Острый ум 🧠", "Оптимизм ✨"] },
            { q: "О чем ты чаще всего мечтаешь?", a: ["О путешествиях ✈️", "О больших успехах 🏆", "О маленьких радостях 🌸"] },
            { q: "Что в людях ты ценишь больше всего?", a: ["Искренность 💎", "Чувство юмора 😂", "Верность 🤝"] },
            { q: "Если бы про твою жизнь сняли фильм, это был бы...", a: ["Мелодрама 🎞️", "Комедия 🍿", "Приключения 🗺️"] },
            { q: "В чем твой секрет очарования, Айжан?", a: ["В улыбке 😊", "В таинственности ✨", "В умении слушать 👂"] },
            { q: "Какой совет ты бы дала себе маленькой?", a: ["Ничего не бойся! 💪", "Всё правильно ❤️", "Улыбайся! 😊"] },
            { q: "Что для тебя значит настоящая дружба?", a: ["Поддержка 🫂", "Общий смех 😂", "Доверие 🔒"] },
            { q: "Айжан, ты знаешь, что ты — особенная?", a: ["Теперь точно знаю ✨", "Догадывалась... 😊"] }
        ];

        let current = 0;

        function render() {
            const data = questions[current];
            const cardContent = document.getElementById('card-content');
            const progressText = document.getElementById('progress-text');

            progressText.innerText = `Вопрос ${current + 1} из ${questions.length}`;

            cardContent.innerHTML = `
            <h1>Айжан...</h1>
            <p>${data.q}</p>
            <div class="btn-group" id="btn-box"></div>
        `;

            const btnBox = document.getElementById('btn-box');
            data.a.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt;
                b.onclick = () => {
                    answers.push(`<b>${data.q}</b>\n└ <i>${opt}</i>`);
                    current++;
                    if (current < questions.length) render();
                    else finish();
                };
                btnBox.appendChild(b);
            });
        }

        async function finish() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('final-screen').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            const message = `<b>📬 АЙЖАН ПРОШЛА ОПРОС!</b>\n\n${answers.join('\n\n')}`;

            try {
                await fetch(`https://api.telegram.org{CONFIG.token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CONFIG.chatId, text: message, parse_mode: "HTML" })
                });
            } catch (e) {
                console.log("Silent Error Logged");
            }
        }

        render();
    </script>
</body>

</html>
